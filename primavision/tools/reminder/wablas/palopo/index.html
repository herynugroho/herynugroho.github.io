<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primahome WA Reminder</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans p-6">

    <div class="max-w-6xl mx-auto bg-white p-6 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold mb-4 text-blue-600">Primahome WhatsApp Reminder</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 bg-blue-50 p-4 rounded border border-blue-200">
            <div>
                <label class="block text-sm font-medium mb-1">Domain API Wablas</label>
                <input type="text" id="wablasDomain" placeholder="https://solo.wablas.com" class="w-full p-2 border rounded focus:ring focus:ring-blue-300">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">API Token Wablas</label>
                <input type="password" id="wablasToken" placeholder="Masukkan token Anda..." class="w-full p-2 border rounded focus:ring focus:ring-blue-300">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">URL Proxy PHP</label>
                <input type="text" id="proxyUrl" placeholder="https://primagps.kasau.software/api/proxy-wa" class="w-full p-2 border rounded focus:ring focus:ring-blue-300">
            </div>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium mb-2">Upload File Excel (.xlsx / .xls)</label>
            <p class="text-xs text-gray-500 mb-2">Pastikan baris pertama excel mengandung kolom: jt, nopel, nama, no_wa, nominal</p>
            <input type="file" id="excelFile" accept=".xlsx, .xls" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
        </div>

        <div class="flex flex-col md:flex-row items-center justify-between gap-4 mb-4">
            <button id="btnKirimSemua" onclick="toggleAutoSend()" class="hidden bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded shadow transition">
                Kirim Semua
            </button>

            <div id="cooldownAlert" class="hidden flex-1 p-3 bg-yellow-100 text-yellow-800 rounded-lg font-bold text-center border border-yellow-300 w-full">
                Jeda pengiriman aktif. Melanjutkan otomatis dalam: <span id="timerText">05:00</span>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse" style="min-width: 600px;">
                <thead>
                    <tr class="bg-gray-200">
                        <th class="p-3 border-b w-1/3">Nama Kontak (JT_NOPEL_NAMA)</th>
                        <th class="p-3 border-b w-1/3">No WA</th>
                        <th class="p-3 border-b text-center w-1/3">Aksi</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="3" class="p-3 text-center text-gray-500 border-b">Silakan upload file Excel terlebih dahulu.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const messageTemplates = [
            "Halo {nama}, semoga harinya menyenangkan! Kami dari tim Primahome bermaksud memberikan pengingat bersahabat terkait layanan Anda (No. Pelanggan: {nopel}). Tagihan Anda saat ini tercatat sebesar {nominal}.\n\nJika sudah melakukan pembayaran, pesan ini bisa diabaikan.\nJika butuh info:\nKetik \"rek\" untuk rekening\nKetik \"CS\" untuk nomer CS",
            "Hai {nama}, perkenalkan kami tim dari Primahome. Pesan ini sekadar pengingat berkala untuk layanan aktif Anda dengan No. Pelanggan: {nopel}. Nominal tagihan Anda adalah {nominal}.\n\nJika sudah melakukan pembayaran, pesan ini bisa diabaikan.\nJika butuh info:\nKetik \"rek\" untuk rekening\nKetik \"CS\" untuk nomer CS",
            "Selamat beraktivitas {nama}! Kami dari Primahome ingin memastikan layanan Anda (No. Pelanggan: {nopel}) tetap berjalan lancar. Tagihan layanan Anda saat ini adalah {nominal}.\n\nJika sudah melakukan pembayaran, pesan ini bisa diabaikan.\nJika butuh info:\nKetik \"rek\" untuk rekening\nKetik \"CS\" untuk nomer CS",
            "Yth. {nama}, semoga Anda dalam keadaan sehat. Kami tim Primahome ingin membagikan pengingat rutin untuk layanan Anda (No. Pelanggan: {nopel}) dengan tagihan sebesar {nominal}.\n\nJika sudah melakukan pembayaran, pesan ini bisa diabaikan.\nJika butuh info:\nKetik \"rek\" untuk rekening\nKetik \"CS\" untuk nomer CS",
            "Salam hangat {nama}! Tim Primahome di sini sekadar menyapa dan mengingatkan perihal layanan Anda (No. Pelanggan: {nopel}). Terdapat tagihan tercatat sebesar {nominal}.\n\nJika sudah melakukan pembayaran, pesan ini bisa diabaikan.\nJika butuh info:\nKetik \"rek\" untuk rekening\nKetik \"CS\" untuk nomer CS",
            "Halo {nama}, semoga rutinitasnya berjalan lancar ya. Ini adalah pengingat bersahabat dari Primahome untuk layanan Anda (No. Pelanggan: {nopel}). Nominal tagihan saat ini adalah {nominal}.\n\nJika sudah melakukan pembayaran, pesan ini bisa diabaikan.\nJika butuh info:\nKetik \"rek\" untuk rekening\nKetik \"CS\" untuk nomer CS",
            "Hai {nama}, kami dari Primahome ingin mengucapkan terima kasih telah menggunakan layanan kami. Sekadar pengingat berkala, tagihan Anda (No. Pelanggan: {nopel}) adalah sebesar {nominal}.\n\nJika sudah melakukan pembayaran, pesan ini bisa diabaikan.\nJika butuh info:\nKetik \"rek\" untuk rekening\nKetik \"CS\" untuk nomer CS",
            "Selamat pagi/siang/sore {nama}, tim Primahome hadir untuk memberikan pengingat layanan secara otomatis untuk No. Pelanggan: {nopel}. Tagihan yang tercatat adalah {nominal}.\n\nJika sudah melakukan pembayaran, pesan ini bisa diabaikan.\nJika butuh info:\nKetik \"rek\" untuk rekening\nKetik \"CS\" untuk nomer CS",
            "Yth. {nama}, pesan dari Primahome ini merupakan pengingat ramah untuk layanan Anda (No. Pelanggan: {nopel}). Terdapat tagihan sebesar {nominal}.\n\nJika sudah melakukan pembayaran, pesan ini bisa diabaikan.\nJika butuh info:\nKetik \"rek\" untuk rekening\nKetik \"CS\" untuk nomer CS",
            "Halo {nama}! Kami selalu berkomitmen memberikan kenyamanan terbaik di Primahome. Pengingat ini menginformasikan tagihan layanan Anda (No. Pelanggan: {nopel}) sebesar {nominal}.\n\nJika sudah melakukan pembayaran, pesan ini bisa diabaikan.\nJika butuh info:\nKetik \"rek\" untuk rekening\nKetik \"CS\" untuk nomer CS",
            "Hai {nama}, sekadar pengingat bersahabat dari tim Primahome. Tagihan layanan Anda (No. Pelanggan: {nopel}) saat ini adalah {nominal} agar layanan dapat dinikmati tanpa kendala.\n\nJika sudah melakukan pembayaran, pesan ini bisa diabaikan.\nJika butuh info:\nKetik \"rek\" untuk rekening\nKetik \"CS\" untuk nomer CS",
            "Salam sejahtera {nama}, kami dari Primahome bermaksud menginformasikan pengingat layanan Anda (No. Pelanggan: {nopel}) bulan ini. Nominal tagihan tercatat adalah {nominal}.\n\nJika sudah melakukan pembayaran, pesan ini bisa diabaikan.\nJika butuh info:\nKetik \"rek\" untuk rekening\nKetik \"CS\" untuk nomer CS",
            "Halo {nama}, perkenalkan kami tim pengingat dari Primahome. Kami menginformasikan tagihan layanan Anda (No. Pelanggan: {nopel}) sebesar {nominal}.\n\nJika sudah melakukan pembayaran, pesan ini bisa diabaikan.\nJika butuh info:\nKetik \"rek\" untuk rekening\nKetik \"CS\" untuk nomer CS",
            "Hai {nama}, ini sapaan hangat dari Primahome sekaligus pengingat ringan mengenai layanan Anda (No. Pelanggan: {nopel}). Terdapat tagihan sebesar {nominal}.\n\nJika sudah melakukan pembayaran, pesan ini bisa diabaikan.\nJika butuh info:\nKetik \"rek\" untuk rekening\nKetik \"CS\" untuk nomer CS",
            "Selamat beraktivitas {nama}, semoga selalu dilancarkan urusannya. Kami mengirimkan pesan pengingat layanan Primahome Anda (No. Pelanggan: {nopel}) dengan tagihan {nominal}.\n\nJika sudah melakukan pembayaran, pesan ini bisa diabaikan.\nJika butuh info:\nKetik \"rek\" untuk rekening\nKetik \"CS\" untuk nomer CS",
            "Yth. {nama}, terima kasih atas kepercayaan Anda pada Primahome. Pesan otomatis ini untuk mengingatkan tagihan layanan Anda (No. Pelanggan: {nopel}) sebesar {nominal}.\n\nJika sudah melakukan pembayaran, pesan ini bisa diabaikan.\nJika butuh info:\nKetik \"rek\" untuk rekening\nKetik \"CS\" untuk nomer CS",
            "Halo {nama}! Pengingat ini dari Primahome hadir agar Anda nyaman berselancar. Tagihan layanan Anda (No. Pelanggan: {nopel}) tercatat sebesar {nominal}.\n\nJika sudah melakukan pembayaran, pesan ini bisa diabaikan.\nJika butuh info:\nKetik \"rek\" untuk rekening\nKetik \"CS\" untuk nomer CS",
            "Salam {nama}, tim Primahome ingin memastikan kelancaran layanan Anda (No. Pelanggan: {nopel}). Sekadar menginfokan, tagihan saat ini adalah {nominal}.\n\nJika sudah melakukan pembayaran, pesan ini bisa diabaikan.\nJika butuh info:\nKetik \"rek\" untuk rekening\nKetik \"CS\" untuk nomer CS",
            "Hai {nama}, semoga Anda dalam kondisi prima. Kami dari Primahome sekadar mengingatkan terkait layanan aktif Anda (No. Pelanggan: {nopel}) dengan nominal tagihan {nominal}.\n\nJika sudah melakukan pembayaran, pesan ini bisa diabaikan.\nJika butuh info:\nKetik \"rek\" untuk rekening\nKetik \"CS\" untuk nomer CS",
            "Halo {nama}, pesan ini adalah bentuk perhatian tim Primahome untuk kenyamanan layanan Anda (No. Pelanggan: {nopel}). Tercatat tagihan sebesar {nominal}.\n\nJika sudah melakukan pembayaran, pesan ini bisa diabaikan.\nJika butuh info:\nKetik \"rek\" untuk rekening\nKetik \"CS\" untuk nomer CS",
            "Yth. {nama}, semoga harinya berkah selalu. Ini adalah pengingat layanan Primahome otomatis (No. Pelanggan: {nopel}) untuk tagihan sebesar {nominal}.\n\nJika sudah melakukan pembayaran, pesan ini bisa diabaikan.\nJika butuh info:\nKetik \"rek\" untuk rekening\nKetik \"CS\" untuk nomer CS",
            "Hai {nama}, terima kasih telah menjadi bagian dari keluarga Primahome. Pengingat ini dikirimkan untuk layanan Anda (No. Pelanggan: {nopel}) dengan tagihan {nominal}.\n\nJika sudah melakukan pembayaran, pesan ini bisa diabaikan.\nJika butuh info:\nKetik \"rek\" untuk rekening\nKetik \"CS\" untuk nomer CS",
            "Selamat pagi/siang/sore {nama}! Kami dari tim Primahome memberikan notifikasi ringan perihal layanan Anda (No. Pelanggan: {nopel}). Nominal tagihannya adalah {nominal}.\n\nJika sudah melakukan pembayaran, pesan ini bisa diabaikan.\nJika butuh info:\nKetik \"rek\" untuk rekening\nKetik \"CS\" untuk nomer CS",
            "Halo {nama}, semoga aktivitas hari ini berkesan. Primahome menyapa Anda untuk memberikan info tagihan layanan (No. Pelanggan: {nopel}) sebesar {nominal}.\n\nJika sudah melakukan pembayaran, pesan ini bisa diabaikan.\nJika butuh info:\nKetik \"rek\" untuk rekening\nKetik \"CS\" untuk nomer CS",
            "Salam hangat {nama}, kami dari Primahome memberikan pengingat layanan Anda (No. Pelanggan: {nopel}) dengan tagihan {nominal}.\n\nJika sudah melakukan pembayaran, pesan ini bisa diabaikan.\nJika butuh info:\nKetik \"rek\" untuk rekening\nKetik \"CS\" untuk nomer CS"
        ];

        let sendCounter = 0;
        let isCooldown = false;
        let isAutoSending = false;

        function copyText(text, btnElement) {
            navigator.clipboard.writeText(text).then(() => {
                const originalHTML = btnElement.innerHTML;
                btnElement.innerHTML = `<span class="text-xs font-bold text-green-600">Copied!</span>`;
                setTimeout(() => {
                    btnElement.innerHTML = originalHTML;
                }, 1500);
            }).catch(err => {
                console.error('Gagal meng-copy: ', err);
            });
        }

        const copyIcon = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>`;

        document.getElementById('excelFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[sheetName];
                const jsonResult = XLSX.utils.sheet_to_json(worksheet);
                renderTable(jsonResult);
            };
            reader.readAsArrayBuffer(file);
        });

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            // Tampilkan tombol "Kirim Semua" jika ada data
            if(data.length > 0) {
                document.getElementById('btnKirimSemua').classList.remove('hidden');
            }

            data.forEach((row, index) => {
                const jt = row['jt'] || '';
                const nopel = row['nopel'] || '';
                const nama = row['nama'] || '';
                const nominal = row['nominal'] || '';
                
                const namaKontakBase = `${jt}_${nopel}_${nama}`;
                
                const rawNoWa = row['no_wa'] ? row['no_wa'].toString() : '';
                const waArray = rawNoWa.includes(',') ? rawNoWa.split(',') : [rawNoWa];

                waArray.forEach((waNumber, waIndex) => {
                    const noWa = waNumber.trim();
                    if (!noWa) return; 

                    const namaKontak = waArray.length > 1 ? `${namaKontakBase} - ${waIndex + 1}` : namaKontakBase;

                    const randomTemplate = messageTemplates[Math.floor(Math.random() * messageTemplates.length)];
                    let pesan = randomTemplate
                                    .replace(/{nama}/g, nama)
                                    .replace(/{nopel}/g, nopel)
                                    .replace(/{nominal}/g, nominal);
                                    
                    const safePesan = encodeURIComponent(pesan);

                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-gray-50 transition border-b";
                    
                    // Memasukkan data-attributes untuk kebutuhan auto send
                    tr.innerHTML = `
                        <td class="p-3 text-sm font-medium text-gray-700">
                            <div class="flex items-center justify-between">
                                <span>${namaKontak}</span>
                                <button onclick="copyText('${namaKontak}', this)" class="text-gray-400 hover:text-blue-600 transition" title="Copy Nama">
                                    ${copyIcon}
                                </button>
                            </div>
                        </td>
                        <td class="p-3 text-sm text-gray-600">
                            <div class="flex items-center justify-between">
                                <span>${noWa}</span>
                                <button onclick="copyText('${noWa}', this)" class="text-gray-400 hover:text-blue-600 transition" title="Copy WA">
                                    ${copyIcon}
                                </button>
                            </div>
                        </td>
                        <td class="p-3 text-center">
                            <button data-phone="${noWa}" data-message="${safePesan}" data-nama="${namaKontak}" onclick="kirimPesan(this, '${noWa}', '${safePesan}', '${namaKontak}')" class="kirim-btn bg-green-500 hover:bg-green-600 text-white font-bold py-1 px-4 rounded text-sm transition">
                                Kirim
                            </button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            });
        }

        // --- FUNGSI PENGIRIMAN MASSAL (AUTO SEND) ---
        async function toggleAutoSend() {
            const btnAuto = document.getElementById('btnKirimSemua');
            
            // Jika sedang berjalan, hentikan
            if (isAutoSending) {
                isAutoSending = false;
                btnAuto.innerText = "Kirim Semua";
                btnAuto.classList.replace('bg-red-500', 'bg-indigo-600');
                btnAuto.classList.replace('hover:bg-red-600', 'hover:bg-indigo-700');
                return;
            }

            // Jika belum berjalan, mulai pengiriman massal
            isAutoSending = true;
            btnAuto.innerText = "Hentikan Pengiriman";
            btnAuto.classList.replace('bg-indigo-600', 'bg-red-500');
            btnAuto.classList.replace('hover:bg-indigo-700', 'hover:bg-red-600');

            const btns = document.querySelectorAll('.kirim-btn');
            
            for (let i = 0; i < btns.length; i++) {
                if (!isAutoSending) break; // Berhenti jika user klik tombol Hentikan

                const btn = btns[i];
                if (btn.innerText === "Terkirim") continue; // Lewati yang sudah terkirim

                // Tunggu jika sedang masa jeda cooldown
                while (isCooldown) {
                    if (!isAutoSending) break;
                    await new Promise(resolve => setTimeout(resolve, 1000));
                }
                
                if (!isAutoSending) break;

                const phone = btn.getAttribute('data-phone');
                const safeMessage = btn.getAttribute('data-message');
                const namaKontak = btn.getAttribute('data-nama');

                // Lakukan pengiriman
                await kirimPesan(btn, phone, safeMessage, namaKontak);
                
                // Jeda 2 detik antar pesan normal agar server aman
                if (isAutoSending && !isCooldown) {
                    await new Promise(resolve => setTimeout(resolve, 2000));
                }
            }

            // Reset tombol saat proses selesai / dihentikan
            isAutoSending = false;
            btnAuto.innerText = "Kirim Semua";
            btnAuto.classList.replace('bg-red-500', 'bg-indigo-600');
            btnAuto.classList.replace('hover:bg-red-600', 'hover:bg-indigo-700');
            
            // Cek apakah semua sudah terkirim
            if(document.querySelectorAll('.kirim-btn:not(:disabled)').length === 0) {
                alert("Pengiriman Massal Selesai!");
            }
        }

        // --- FUNGSI PENGIRIMAN INDIVIDUAL ---
        async function kirimPesan(btn, phone, safeMessage, namaKontak) {
            // Jika diklik manual saat cooldown, tolak. (Jika dari Auto Send, sudah ditahan oleh while-loop di atas)
            if (isCooldown && !isAutoSending) {
                alert("Sedang dalam masa jeda 5 menit. Harap tunggu.");
                return;
            }

            const domain = document.getElementById('wablasDomain').value.trim();
            const token = document.getElementById('wablasToken').value.trim();
            const proxyUrl = document.getElementById('proxyUrl').value.trim();
            
            const message = decodeURIComponent(safeMessage);

            if (!domain || !token || !proxyUrl) {
                alert("Mohon isi Domain Wablas, API Token, dan URL Proxy terlebih dahulu!");
                isAutoSending = false; // Matikan auto send jika ada error input
                document.getElementById('btnKirimSemua').innerText = "Kirim Semua";
                document.getElementById('btnKirimSemua').classList.replace('bg-red-500', 'bg-indigo-600');
                document.getElementById('btnKirimSemua').classList.replace('hover:bg-red-600', 'hover:bg-indigo-700');
                return;
            }

            btn.disabled = true;
            btn.innerText = "Mengirim...";
            btn.classList.replace('bg-green-500', 'bg-gray-400');
            btn.classList.replace('hover:bg-green-600', 'hover:bg-gray-500');

            try {
                const response = await fetch(proxyUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        domain: domain,
                        token: token,
                        phone: phone,
                        message: message,
                        nama: namaKontak
                    })
                });

                const result = await response.json();

                if (response.ok && result.status) {
                    btn.innerText = "Terkirim";
                    btn.classList.replace('bg-gray-400', 'bg-blue-500');
                    btn.classList.replace('hover:bg-gray-500', 'hover:bg-blue-600');
                    
                    sendCounter++;
                    checkCooldown();
                } else {
                    throw new Error(result.message || "Gagal mengirim pesan");
                }

            } catch (error) {
                console.error("Error API:", error);
                // Jika dari auto send kita log saja agar tidak spam alert, jika manual kita munculkan alert
                if(!isAutoSending) alert("Gagal mengirim: " + error.message);
                
                btn.disabled = false;
                btn.innerText = "Kirim Ulang";
                btn.classList.replace('bg-gray-400', 'bg-red-500');
                btn.classList.replace('hover:bg-gray-500', 'hover:bg-red-600');
            }
        }

        // --- LOGIKA JEDA (COOLDOWN) ---
        function checkCooldown() {
            if (sendCounter > 0 && sendCounter % 5 === 0) {
                mulaiCooldown();
            }
        }

        function mulaiCooldown() {
            isCooldown = true;
            const alertBox = document.getElementById('cooldownAlert');
            const timerText = document.getElementById('timerText');
            const allBtns = document.querySelectorAll('.kirim-btn:not(:disabled)');
            
            // Disabled tombol manual saat cooldown
            allBtns.forEach(btn => btn.disabled = true);
            alertBox.classList.remove('hidden');

            let timeLeft = 300; // 5 menit dalam detik

            const timerInterval = setInterval(() => {
                let minutes = Math.floor(timeLeft / 60);
                let seconds = timeLeft % 60;
                
                minutes = minutes < 10 ? '0' + minutes : minutes;
                seconds = seconds < 10 ? '0' + seconds : seconds;
                
                timerText.innerText = `${minutes}:${seconds}`;

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    isCooldown = false;
                    alertBox.classList.add('hidden');
                    
                    // Enable kembali tombol manual
                    const resetBtns = document.querySelectorAll('.kirim-btn');
                    resetBtns.forEach(btn => {
                        if (btn.innerText === "Kirim" || btn.innerText === "Kirim Ulang") {
                            btn.disabled = false;
                        }
                    });
                }
                timeLeft--;
            }, 1000);
        }
    </script>
</body>
</html>
